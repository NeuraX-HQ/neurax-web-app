<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
      }
      .floating-island-shadow {
        filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.15));
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Top Navigation Bar (Suppressed because Transactional Onboarding) -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-12 pb-24 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary-fixed-dim/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[20%] left-[-5%] w-48 h-48 bg-tertiary-container/10 rounded-full blur-3xl"></div>
<!-- Streak Badge HUD -->
<div class="z-20 mb-8 transform hover:scale-105 transition-transform cursor-default">
<div class="glass-card px-5 py-2 rounded-full border border-white/40 flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-streak-orange" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label text-sm font-bold text-on-surface uppercase tracking-wider">Streak: 7 Days</span>
</div>
</div>
<!-- Hero Section: Blue Chibi Dragon on Floating Island -->
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center mb-12">
<!-- Floating Island Visual Base -->
<div class="absolute bottom-4 w-4/5 h-16 bg-gradient-to-t from-surface-dim to-transparent rounded-[100%] blur-xl opacity-50"></div>
<!-- Main Character Stage -->
<div class="relative z-10 w-full h-full flex items-center justify-center">
<div class="grid grid-cols-12 gap-2 items-end w-full">
<!-- Stage 1: Smallest -->
<div class="col-span-3 transform -translate-y-4">
<div class="glass-card p-1 rounded-lg border border-white/30 shadow-sm">
<img alt="Dragon Stage 1" class="w-full aspect-square object-cover rounded-md floating-island-shadow" src="https://lh3.googleusercontent.com/aida/ADBb0uiEuiPtYKDX2xx2iQkancdrgiNqSIu0GMOtxJMJGF4PW_OXsHKFXIao52MbQyuMsGkVBj5aJQ35mI26sV63pqZfLjgwB8X0TdzvjF5hK4F5HSrQ8vX2BwjwTFauWZ7WU7hZBf9Q0F91z-ypwANbJ6piznNIHftcYcySLBk81SXrPaMCm4wts6wGBUfnXY_aE9JIzMb-PrGK47SiJU1-rD4iqku_nW8OCrejXdqX3XRAdod9YVYD_Nhi_oMgh1SFfjaBIIJgbcbm"/>
</div>
<p class="text-[8px] font-black uppercase tracking-tighter text-center mt-2 opacity-50">Stage 1</p>
</div>
<!-- Stage 2: Middle -->
<div class="col-span-4 transform -translate-y-8 z-10">
<div class="glass-card p-1.5 rounded-xl border border-white/40 shadow-md">
<img alt="Dragon Stage 2" class="w-full aspect-square object-cover rounded-lg floating-island-shadow" src="https://lh3.googleusercontent.com/aida/ADBb0ugVVVDMheWveJ5T2YTLOg4mpeMRu_VdplR8WFszPGjR7ZE_UOIwpnW2mLq9N0gwr27e7eXC4p8HKIRNHFpB9OcDj61TUCVRzHoYL2CZqQxexWaY8bcI1k8q_zfvtOrZv4VjdGt2spajYv6qxtuNMSHNUUc7vb8DFhV_2e6LH2-VuFcF9nQogm1U8LOlshqZDTWaNADTcTBKFd10pIAHOIOI0UYlKIg0s_2sF4lO4j3A1hPBCnw8Uxr7k8JSjUczVIk-Y3_SoZI"/>
</div>
<p class="text-[9px] font-black uppercase tracking-tight text-center mt-2 opacity-70">Stage 2</p>
</div>
<!-- Stage 3: Largest/Final -->
<div class="col-span-5 z-20">
<div class="glass-card p-2 rounded-2xl border border-white/50 shadow-xl ring-2 ring-primary/20">
<img alt="Dragon Stage 3" class="w-full aspect-square object-cover rounded-xl floating-island-shadow" src="https://lh3.googleusercontent.com/aida/ADBb0uheOz3EfbgJdBdPdhthkpNgigFKC4JIqou05DpAmt4LZixV2Qo0-rj33RjcA7MD1IHg5bEY01dTImRDoKK4t2cFCTfdSXcjGpGMdN3isOZO9NKxWZG5kt0zhP1gtkvXeBtJSmn03ogNV2DxVyR5QfPFCe2I6LhYpk7kuhUrTv8bfpWgu6_I_GihsPlvZLfWd95UhvLSmuCaRUfXMd7pAV8sw3n_FM8FwxcmV4M1eVWyiD6Y0Iyum7NKh2ohZqG3UTwmJ-xsw_Sn"/>
</div>
<p class="text-[10px] font-black uppercase tracking-widest text-center mt-2 text-primary">Final Form</p>
</div>
</div>
</div>
<!-- Floating Level Markers (Game UI Elements) -->
<div class="absolute top-1/4 left-0 glass-card p-3 rounded-xl border border-white/50 shadow-lg transform -rotate-6">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div class="absolute bottom-1/4 right-0 glass-card p-3 rounded-xl border border-white/50 shadow-lg transform rotate-12">
<span class="material-symbols-outlined text-streak-orange text-xl" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
</div>
<!-- Content Area -->
<div class="text-center max-w-md z-20">
<h1 class="font-headline font-extrabold text-4xl text-on-surface leading-tight mb-4 tracking-tight">
                Kỷ luật là sức mạnh
            </h1>
<p class="font-body text-secondary text-lg leading-relaxed px-4">
                Duy trì chuỗi ngày ghi chép <span class="text-streak-orange font-bold">(Streak)</span> để nuôi lớn chú Rồng Chibi của bạn. Chứng kiến sự thay đổi của cơ thể qua từng cấp độ.
            </p>
</div>
<!-- Level Progress Bar Visual -->
<div class="w-full max-w-xs mt-10 space-y-2">
<div class="flex justify-between items-end px-1">
<span class="font-label text-[10px] text-secondary font-black uppercase tracking-widest">Level 1: Hatchling</span>
<span class="font-label text-[10px] text-primary font-black uppercase tracking-widest">75% EXP</span>
</div>
<div class="h-3 w-full bg-surface-container-high rounded-full overflow-hidden border border-white/50">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-3/4 rounded-full shadow-[0_0_12px_rgba(16,185,129,0.4)]"></div>
</div>
</div>
<!-- Tactical Action Button -->
<div class="fixed bottom-12 left-0 w-full px-6 flex justify-center z-50">
<button class="w-full max-w-md bg-neura-dark text-white font-headline font-bold py-5 rounded-xl shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 group">
<span class="text-lg">Bắt đầu lộ trình</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</main>
<!-- Navigation Shell Suppressed - Transactional screen -->
</body></html>
