<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Precision Scan - Food Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500&amp;family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "tertiary-fixed": "#ffdad7",
              "on-primary-fixed-variant": "#005236",
              "primary-container": "#10b981",
              "on-secondary": "#ffffff",
              "on-primary-fixed": "#002113",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#3c4a42",
              "tertiary-container": "#fc7c78",
              "on-tertiary-fixed": "#410005",
              "on-tertiary-container": "#711419",
              "surface-bright": "#f7f9fb",
              "background": "#f7f9fb",
              "surface-container-highest": "#e0e3e5",
              "tertiary": "#a43a3a",
              "on-primary-container": "#00422b",
              "tertiary-fixed-dim": "#ffb3af",
              "surface-container": "#eceef0",
              "surface-variant": "#e0e3e5",
              "on-secondary-container": "#646464",
              "on-tertiary": "#ffffff",
              "surface-dim": "#d8dadc",
              "surface-container-low": "#f2f4f6",
              "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#474747",
              "on-surface": "#191c1e",
              "on-error": "#ffffff",
              "secondary-container": "#e2e2e2",
              "primary": "#006c49",
              "on-tertiary-fixed-variant": "#842225",
              "secondary-fixed-dim": "#c6c6c6",
              "on-background": "#191c1e",
              "surface": "#f7f9fb",
              "secondary-fixed": "#e2e2e2",
              "outline-variant": "#bbcabf",
              "primary-fixed-dim": "#4edea3",
              "outline": "#6c7a71",
              "surface-container-high": "#e6e8ea",
              "inverse-primary": "#4edea3",
              "on-secondary-fixed": "#1b1b1b",
              "primary-fixed": "#6ffbbe",
              "inverse-surface": "#2d3133",
              "error": "#ba1a1a",
              "surface-tint": "#006c49",
              "inverse-on-surface": "#eff1f3",
              "secondary": "#5e5e5e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .viewfinder-bracket {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #10b981; /* primary-container color */
        }
        .glassmorphism {
            backdrop-filter: blur(12px);
            background: rgba(25, 28, 30, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-surface overflow-hidden h-screen flex flex-col font-body">
<!-- Camera Background Viewfinder -->
<div class="fixed inset-0 z-0">
<img alt="Close-up high quality poke bowl with salmon and avocado" class="w-full h-full object-cover" data-alt="Close-up high quality poke bowl with salmon and avocado" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfMQsfOCXs4GN17MW1_9zKA8DXOHDIA9Y229NWhy3-zQa3gk3pV6UnmOQ7HXtH6or-mwrr2Z7m3Aa-oPEzi38qok1wh9lRXrhbgWZGBYY6hpba0bIoZ3x51EKd_ibYvXearBqb1v3idE94mZZgV-_dpUk_JbuXJcPM6cTMDWiR14cXc0B2ejuoz7woY898hD7xYDT_eJBB402wzvQlQO1T8xi7HbF04At7dHvOTmg-Q0Q8-mM3gLJN-U_VU0O0nEKhFwo6y6czVA"/>
<!-- Viewfinder Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
</div>
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full glassmorphism backdrop-blur-md">
<div class="flex items-center">
<span class="material-symbols-outlined text-white text-2xl hover:opacity-80 transition-opacity">close</span>
</div>
<div class="text-emerald-500 font-manrope uppercase tracking-widest text-xs font-bold">
            PRECISION SCAN
        </div>
<div class="flex items-center">
<span class="material-symbols-outlined text-white text-2xl hover:opacity-80 transition-opacity">flashlight_on</span>
</div>
</header>
<!-- Main Content Area / Viewfinder Brackets -->
<main class="relative flex-grow flex items-center justify-center pointer-events-none">
<!-- Central Focus Area -->
<div class="relative w-72 h-72 md:w-96 md:h-96 border border-white/10">
<!-- Emerald Vision Brackets -->
<div class="viewfinder-bracket top-0 left-0 border-t-2 border-l-2"></div>
<div class="viewfinder-bracket top-0 right-0 border-t-2 border-r-2"></div>
<div class="viewfinder-bracket bottom-0 left-0 border-b-2 border-l-2"></div>
<div class="viewfinder-bracket bottom-0 right-0 border-b-2 border-r-2"></div>
<!-- Technical Metadata HUD -->
<div class="absolute -top-10 left-0">
<span class="font-label text-[10px] text-emerald-400 tracking-[0.2em] font-bold">FOCUS: OPTIMAL</span>
</div>
<div class="absolute -bottom-10 right-0">
<span class="font-label text-[10px] text-emerald-400 tracking-[0.2em] font-bold">AI_DETECTION: ACTIVE</span>
</div>
</div>
</main>
<!-- Controls Overlay Section -->
<section class="relative z-10 w-full flex flex-col items-center pb-32">
<!-- Mode Selector -->
<div class="flex items-center space-x-8 mb-8">
<span class="font-label text-[11px] font-bold tracking-widest text-slate-400 transition-colors">BARCODE</span>
<div class="flex flex-col items-center">
<span class="font-label text-[11px] font-bold tracking-widest text-emerald-400">FOOD</span>
<div class="h-1 w-1 bg-emerald-400 rounded-full mt-1"></div>
</div>
<span class="font-label text-[11px] font-bold tracking-widest text-slate-400 transition-colors">LABEL</span>
</div>
<!-- Shutter & Secondary Actions -->
<div class="flex items-center justify-between w-full px-12 max-w-md">
<!-- Gallery Icon -->
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/10 backdrop-blur-md">
<span class="material-symbols-outlined text-white">photo_library</span>
</div>
<!-- Capture Button (The Shutter) -->
<button class="group relative flex items-center justify-center w-20 h-20 bg-white rounded-full transition-transform active:scale-90 duration-200">
<div class="w-[70px] h-[70px] rounded-full border-2 border-on-surface"></div>
<!-- Shutter Inner Ring -->
<div class="absolute inset-0 rounded-full border-4 border-white"></div>
</button>
<!-- Flash Toggle -->
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/10 backdrop-blur-md">
<span class="material-symbols-outlined text-white">bolt</span>
</div>
</div>
</section>
<!-- Bottom Navigation Bar (Shared Component Strategy) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-slate-950/60 backdrop-blur-xl rounded-t-3xl shadow-2xl">
<!-- FOOD TAB (Active) -->
<a class="flex flex-col items-center justify-center text-emerald-400 bg-emerald-500/10 rounded-xl px-4 py-2 transition-transform active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-label text-[10px] font-bold tracking-widest">FOOD</span>
</a>
<!-- BARCODE TAB (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-emerald-200 transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">barcode_scanner</span>
<span class="font-label text-[10px] font-bold tracking-widest">BARCODE</span>
</a>
<!-- LABEL TAB (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-emerald-200 transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">sticky_note_2</span>
<span class="font-label text-[10px] font-bold tracking-widest">LABEL</span>
</a>
</nav>
</body></html>
