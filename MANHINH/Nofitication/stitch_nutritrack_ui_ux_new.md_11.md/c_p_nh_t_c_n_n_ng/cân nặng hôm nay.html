<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .blur-backdrop {
        backdrop-filter: blur(8px);
        background-color: rgba(25, 28, 30, 0.4);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface min-h-screen">
<!-- Dashboard Background (Dimmed) -->
<main class="fixed inset-0 overflow-hidden flex flex-col opacity-40 select-none pointer-events-none">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-[#191c1e] text-[#006c49] dark:text-[#10b981] font-['Manrope'] font-bold tracking-tight w-full top-0 z-50 flex items-center justify-between px-6 py-4">
<span class="material-symbols-outlined cursor-pointer hover:opacity-80 transition-opacity">menu</span>
<h1 class="text-lg font-black tracking-widest text-[#191c1e] dark:text-[#f7f9fb]">NUTRITRACK</h1>
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up minimalist profile avatar of a healthy young professional in soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcFNpr1qxhnHnOYfjp7_zydRgS5bqUqCwZS1O-tTGoyaLiWV1kq6nMR1cNcXhBTywuN1WA0a3asoyz-5ls-L-urMCwwjh8Xx7IjrPLTETy49ASWODJ5dMGIDfnhKoKblyUYebCYOGaCd5H0O7vhTv6FHbds5q0JK7qef1NV3084ii1nArsEJGsmStgwCuE4cS54sCh1CjzYuZYd7xVPFMlqow-4Yu0Auo7rI2JS2iqQmh4y0oqXZcffrugY8bhvi6DJyELATgbOQ"/>
</div>
</header>
<section class="p-6 space-y-8 flex-1 overflow-y-auto">
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-6 rounded-xl aspect-square flex flex-col justify-between">
<span class="font-label text-xs uppercase tracking-widest text-secondary">Kcal Left</span>
<span class="text-4xl font-headline font-extrabold">1,420</span>
</div>
<div class="bg-surface-container-lowest p-6 rounded-xl aspect-square flex flex-col justify-between">
<span class="font-label text-xs uppercase tracking-widest text-secondary">Hydration</span>
<span class="text-4xl font-headline font-extrabold text-primary">1.2L</span>
</div>
</div>
<div class="bg-surface-container-lowest p-6 rounded-xl h-48 w-full flex items-center justify-center">
<span class="font-label text-secondary opacity-30 uppercase tracking-tighter text-4xl font-bold">Progress Graph Placeholder</span>
</div>
</section>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#ffffff]/80 dark:bg-[#191c1e]/80 backdrop-blur-xl rounded-t-[2rem] border-t border-[#bbcabf]/15 shadow-[0px_-10px_30px_rgba(25,28,30,0.04)]">
<div class="flex flex-col items-center text-[#5c5e61] dark:text-[#919191] hover:text-[#10b981] dark:hover:text-[#006c49] cursor-pointer">
<span class="material-symbols-outlined">photo_camera</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-wider">Scan</span>
</div>
<div class="flex flex-col items-center text-[#006c49] dark:text-[#10b981] font-bold cursor-pointer">
<span class="material-symbols-outlined">edit_note</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-wider">Log</span>
</div>
<div class="flex flex-col items-center text-[#5c5e61] dark:text-[#919191] hover:text-[#10b981] dark:hover:text-[#006c49] cursor-pointer">
<span class="material-symbols-outlined">timeline</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-wider">Trends</span>
</div>
<div class="flex flex-col items-center text-[#5c5e61] dark:text-[#919191] hover:text-[#10b981] dark:hover:text-[#006c49] cursor-pointer">
<span class="material-symbols-outlined">person</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-wider">Profile</span>
</div>
</nav>
</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 blur-backdrop">
<!-- Modal Card -->
<div class="bg-surface-container-lowest w-full max-w-sm rounded-xl overflow-hidden shadow-[0px_20px_40px_rgba(25,28,30,0.06)] ring-1 ring-outline-variant/15">
<div class="p-8 flex flex-col items-center text-center space-y-6">
<!-- Header Icon & Title -->
<div class="space-y-3 flex flex-col items-center">
<div class="w-14 h-14 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" style="color: #4A90D9;">scale</span>
</div>
<h2 class="font-headline text-2xl font-extrabold text-on-surface tracking-tight">Cân nặng hôm nay?</h2>
</div>
<!-- Input Stepper Area -->
<div class="w-full space-y-4">
<div class="flex items-center justify-between bg-surface-container p-2 rounded-xl">
<button class="w-14 h-14 flex items-center justify-center rounded-lg bg-surface-container-lowest hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined font-bold">remove</span>
</button>
<div class="flex items-baseline space-x-2">
<span class="text-5xl font-headline font-black text-on-surface">68.5</span>
<span class="font-label text-lg font-bold text-secondary uppercase tracking-widest">kg</span>
</div>
<button class="w-14 h-14 flex items-center justify-center rounded-lg bg-surface-container-lowest hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined font-bold">add</span>
</button>
</div>
<p class="font-label text-[11px] text-secondary/70 uppercase tracking-widest">
                        Lần cuối cập nhật: <span class="text-on-surface font-bold">70kg</span> (7 ngày trước)
                    </p>
</div>
<!-- Trend Line Visual -->
<div class="w-full h-24 relative overflow-hidden rounded-lg bg-primary/5 p-4 flex flex-col justify-end">
<div class="absolute top-3 left-4 flex flex-col items-start">
<span class="font-label text-[10px] uppercase tracking-tighter text-primary/60">Trend Analysis</span>
<span class="text-sm font-bold text-primary flex items-center">
<span class="material-symbols-outlined text-sm mr-1">trending_down</span>
                            -1.5 kg this week
                        </span>
</div>
<!-- Simplified SVG Trendline -->
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 40">
<path d="M0,5 C20,8 40,25 60,22 C80,20 100,35 100,35" fill="none" stroke="#4A90D9" stroke-linecap="round" stroke-width="2"></path>
<circle cx="100" cy="35" fill="#4A90D9" r="3"></circle>
</svg>
</div>
<!-- Action Button -->
<button class="w-full bg-on-surface text-surface py-4 rounded-lg font-headline font-extrabold text-lg transition-transform active:scale-[0.98] shadow-lg shadow-on-surface/10">
                    Lưu cân nặng
                </button>
<button class="text-secondary font-label text-xs uppercase tracking-widest hover:text-on-surface transition-colors">
                    Để sau
                </button>
</div>
</div>
