version: 1
backend:
  phases:
    build:
      commands:
        - npm install --legacy-peer-deps --include=dev
        - cd amplify/ai-engine && npm install && cd ../..
        - cd amplify/process-nutrition && npm install && cd ../..
        - cd amplify/friend-request && npm install && cd ../..
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .expo/**/*
  customRules:
    - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
      target: /index.html
      status: '200'
