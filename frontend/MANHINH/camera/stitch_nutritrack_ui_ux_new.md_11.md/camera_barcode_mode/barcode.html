<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "tertiary-fixed": "#ffdad7",
              "on-primary-fixed-variant": "#005236",
              "primary-container": "#10b981",
              "on-secondary": "#ffffff",
              "on-primary-fixed": "#002113",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#3c4a42",
              "tertiary-container": "#fc7c78",
              "on-tertiary-fixed": "#410005",
              "on-tertiary-container": "#711419",
              "surface-bright": "#f7f9fb",
              "background": "#f7f9fb",
              "surface-container-highest": "#e0e3e5",
              "tertiary": "#a43a3a",
              "on-primary-container": "#00422b",
              "tertiary-fixed-dim": "#ffb3af",
              "surface-container": "#eceef0",
              "surface-variant": "#e0e3e5",
              "on-secondary-container": "#646464",
              "on-tertiary": "#ffffff",
              "surface-dim": "#d8dadc",
              "surface-container-low": "#f2f4f6",
              "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#474747",
              "on-surface": "#191c1e",
              "on-error": "#ffffff",
              "secondary-container": "#e2e2e2",
              "primary": "#006c49",
              "on-tertiary-fixed-variant": "#842225",
              "secondary-fixed-dim": "#c6c6c6",
              "on-background": "#191c1e",
              "surface": "#f7f9fb",
              "secondary-fixed": "#e2e2e2",
              "outline-variant": "#bbcabf",
              "primary-fixed-dim": "#4edea3",
              "outline": "#6c7a71",
              "surface-container-high": "#e6e8ea",
              "inverse-primary": "#4edea3",
              "on-secondary-fixed": "#1b1b1b",
              "primary-fixed": "#6ffbbe",
              "inverse-surface": "#2d3133",
              "error": "#ba1a1a",
              "surface-tint": "#006c49",
              "inverse-on-surface": "#eff1f3",
              "secondary": "#5e5e5e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .scanning-line {
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 15px #10b981, 0 0 5px #10b981;
            width: 100%;
            position: absolute;
            top: 50%;
            left: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-surface font-body overflow-hidden">
<!-- Camera Background with Blur -->
<div class="fixed inset-0 z-0">
<img alt="Blurred grocery store shelf with various products" class="w-full h-full object-cover blur-[4px] brightness-50" data-alt="Blurred grocery store shelf with colorful products" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTmwPAbbfd0pZo1qtk5z3vYqSvPEfLQOq1E_mDmYuWa3kIC2ejpC7R7D4HgHwIr7ZbUYgIX8OvpVpyseCh1nSvkVJqeOOKI10DhzuRKdaCA2SPqAOCsqiK5IApAG1WifWkj1K1iN1FZ5SQK2MviNDy-81ykBR8oZBYmUZS11lFqCRpidH68yOhIY5B3noAXQh38a_I_-Q6iP7ePTIqFgucQPdJx7tc0m4ly1ltnCSbWFfuplWQemDtPGQjj02XD6XSdeia1bEAcQ"/>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full glassmorphism backdrop-blur-md bg-transparent">
<div class="hover:opacity-80 transition-opacity scale-95 active:duration-100 text-slate-300">
<span class="material-symbols-outlined">close</span>
</div>
<h1 class="font-headline uppercase tracking-widest text-xs font-bold text-emerald-500 dark:text-emerald-400">PRECISION SCAN</h1>
<div class="hover:opacity-80 transition-opacity scale-95 active:duration-100 text-emerald-500 dark:text-emerald-400">
<span class="material-symbols-outlined">flashlight_on</span>
</div>
</header>
<!-- Main Viewfinder Area -->
<main class="relative z-10 flex flex-col items-center justify-center h-screen w-full px-8 pb-40">
<!-- Scanning Metadata HUD -->
<div class="absolute top-24 left-8 right-8 flex justify-between items-start">
<div class="flex flex-col gap-1">
<span class="font-label text-[10px] tracking-[0.2em] text-white/60">MODE</span>
<span class="font-label text-xs font-bold text-primary-container tracking-widest">BARCODE_DETECTION_v2</span>
</div>
<div class="flex flex-col items-end gap-1 text-right">
<span class="font-label text-[10px] tracking-[0.2em] text-white/60">STATUS</span>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></div>
<span class="font-label text-xs font-bold text-white tracking-widest uppercase">READY</span>
</div>
</div>
</div>
<!-- Scanning Frame -->
<div class="relative w-full aspect-[4/3] max-w-md border-primary-container/20">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-2 border-l-2 border-primary-container"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-2 border-r-2 border-primary-container"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-2 border-l-2 border-primary-container"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-2 border-r-2 border-primary-container"></div>
<!-- Laser Line -->
<div class="scanning-line"></div>
<!-- Frame Label Overlay -->
<div class="absolute -bottom-12 left-0 right-0 text-center">
<p class="font-label text-sm text-white font-medium tracking-wide">Align barcode within the frame</p>
</div>
</div>
<!-- Capture HUD Controls -->
<div class="absolute bottom-48 flex items-center justify-between w-full px-12">
<button class="w-12 h-12 rounded-full glassmorphism flex items-center justify-center text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined">photo_library</span>
</button>
<button class="w-20 h-20 bg-on-surface rounded-full flex items-center justify-center border-4 border-primary-container shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white text-3xl">barcode_scanner</span>
</button>
<button class="w-12 h-12 rounded-full glassmorphism flex items-center justify-center text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined">zoom_in</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Mode Selector) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-slate-950/60 dark:bg-slate-900/80 rounded-t-3xl backdrop-blur-xl shadow-2xl">
<!-- FOOD TAB -->
<div class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-emerald-200 transition-colors Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">photo_camera</span>
<span class="font-label text-[10px] font-bold tracking-widest">FOOD</span>
</div>
<!-- BARCODE TAB (ACTIVE) -->
<div class="flex flex-col items-center justify-center text-emerald-400 bg-emerald-500/10 rounded-xl px-4 py-2 hover:text-emerald-200 transition-colors Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">barcode_scanner</span>
<span class="font-label text-[10px] font-bold tracking-widest">BARCODE</span>
</div>
<!-- LABEL TAB -->
<div class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-emerald-200 transition-colors Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">sticky_note_2</span>
<span class="font-label text-[10px] font-bold tracking-widest">LABEL</span>
</div>
</nav>
<!-- Floating UI Tooltips (Precision System) -->
<div class="fixed top-1/2 right-4 -translate-y-1/2 flex flex-col gap-4 z-20">
<div class="p-2 bg-on-surface/40 backdrop-blur-md rounded-lg flex flex-col items-center border-l-2 border-primary-container/40">
<span class="font-label text-[8px] text-primary-container font-bold mb-1">ISO</span>
<span class="font-label text-[10px] text-white">400</span>
</div>
<div class="p-2 bg-on-surface/40 backdrop-blur-md rounded-lg flex flex-col items-center border-l-2 border-primary-container/40">
<span class="font-label text-[8px] text-primary-container font-bold mb-1">F-STOP</span>
<span class="font-label text-[10px] text-white">f/2.8</span>
</div>
<div class="p-2 bg-on-surface/40 backdrop-blur-md rounded-lg flex flex-col items-center border-l-2 border-primary-container/40">
<span class="font-label text-[8px] text-primary-container font-bold mb-1">EXP</span>
<span class="font-label text-[10px] text-white">+0.3</span>
</div>
</div>
</body></html>
