<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeuraX Onboarding - Visual Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500&amp;family=Space_Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "tertiary": "#a43a3a",
              "on-surface": "#191c1e",
              "surface-tint": "#006c49",
              "inverse-primary": "#4edea3",
              "on-primary-container": "#00422b",
              "secondary-fixed-dim": "#c6c6c6",
              "secondary-fixed": "#e2e2e2",
              "on-tertiary-fixed": "#410005",
              "on-primary": "#ffffff",
              "surface-dim": "#d8dadc",
              "secondary": "#5e5e5e",
              "surface-container-highest": "#e0e3e5",
              "inverse-surface": "#2d3133",
              "surface-bright": "#f7f9fb",
              "on-primary-fixed-variant": "#005236",
              "on-tertiary-container": "#711419",
              "tertiary-fixed-dim": "#ffb3af",
              "on-secondary-fixed-variant": "#474747",
              "secondary-container": "#e2e2e2",
              "primary-fixed-dim": "#4edea3",
              "on-tertiary-fixed-variant": "#842225",
              "on-secondary-fixed": "#1b1b1b",
              "on-secondary-container": "#646464",
              "on-secondary": "#ffffff",
              "surface": "#f7f9fb",
              "error-container": "#ffdad6",
              "surface-container-high": "#e6e8ea",
              "on-surface-variant": "#3c4a42",
              "surface-container-lowest": "#ffffff",
              "tertiary-container": "#fc7c78",
              "surface-container-low": "#f2f4f6",

              "surface-variant": "#e0e3e5",
              "inverse-on-surface": "#eff1f3",
              "primary-container": "#10b981",
              "on-tertiary": "#ffffff",
              "surface-container": "#eceef0",
              "on-primary-fixed": "#002113",
              "on-error-container": "#93000a",
              "outline-variant": "#bbcabf",
              "error": "#ba1a1a",
              "outline": "#6c7a71"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .waveform-bar {
            width: 3px;
            background: #006c49;
            border-radius: 4px;
        }
        .asymmetric-bg {
            background: radial-gradient(circle at top right, #f2f4f6 0%, #f7f9fb 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Top Navigation Bar (Shared Style) -->
<header class="w-full top-0 z-50 flex items-center justify-between px-6 py-8 fixed">
<div class="font-headline font-black tracking-widest text-lg text-on-surface">
            NUTRITRACK
        </div>
<button class="font-label text-xs uppercase tracking-widest text-secondary hover:opacity-80 transition-opacity">
            Bỏ qua
        </button>
</header>
<main class="min-h-screen flex flex-col px-8 pt-24 pb-12 asymmetric-bg relative">
<!-- Hero Visual Section: Clinical Minimalism -->
<div class="flex-1 flex flex-col justify-center items-center relative py-12">
<!-- Floating Interface / HUD -->
<div class="relative w-full max-w-xs aspect-square">
<!-- Background Decoration -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl scale-125"></div>
<!-- Main Visual Container -->
<div class="relative z-10 glass-panel border border-outline-variant/10 rounded-[3rem] w-full h-full flex items-center justify-center overflow-hidden shadow-[0px_20px_40px_rgba(25,28,30,0.06)]">
<!-- Viewfinder Elements -->
<div class="absolute top-8 left-8 w-6 h-6 border-t-2 border-l-2 border-primary"></div>
<div class="absolute top-8 right-8 w-6 h-6 border-t-2 border-r-2 border-primary"></div>
<div class="absolute bottom-8 left-8 w-6 h-6 border-b-2 border-l-2 border-primary"></div>
<div class="absolute bottom-8 right-8 w-6 h-6 border-b-2 border-r-2 border-primary"></div>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-primary/10 -translate-y-1/2"></div>
<div class="absolute top-0 left-1/2 w-[1px] h-full bg-primary/10 -translate-x-1/2"></div>
<!-- Centered Focus Image -->
<div class="w-48 h-48 rounded-2xl overflow-hidden">
<img alt="Healthy bowl of fresh vegetables and salmon" class="w-full h-full object-cover grayscale-[20%]" data-alt="Close-up of a vibrant healthy poke bowl with salmon, avocado and greens, bright natural lighting, minimalist studio style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiIq8kG5Lj8PIVQZIJ8FaSQ_Fc6JJrtzCJXoCwcoM5UnJ-wwSqBuigaH3urCa0r-93zmYLG0_b54dh8xfGlIFdtgI6mT6w1bL1rLB48W9vx_RGAj94XO0QxtW_oK8zDNNOmkLzM922IDRBm-i5KrPmlgSfZT2FKSssCUapXFfCqUuru9JcbzzqpLx0l_VTL8PA1V96uTr8PFXLzduma6E9K-EQ0FyzD2yUxsjqS6NGmWKi2-EafbgsHcrILfyX1I99C6S2g2MqOA"/>
</div>
<!-- Scanning HUD Label -->
<div class="absolute top-12 left-1/2 -translate-x-1/2 bg-on-surface px-3 py-1 rounded-sm">
<span class="font-label text-[10px] text-surface font-bold tracking-[0.2em]">VISUAL_INTELLIGENCE_V1</span>
</div>
</div>
<!-- Floating Interactive Icon Nodes -->
<!-- Icon 1: Camera -->
<div class="absolute -top-4 -right-4 w-16 h-16 glass-panel rounded-2xl shadow-xl flex items-center justify-center border border-white/40 z-20">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="photo_camera">photo_camera</span>
</div>
<!-- Icon 2: Barcode -->
<div class="absolute top-1/2 -left-8 -translate-y-1/2 w-14 h-14 glass-panel rounded-2xl shadow-xl flex items-center justify-center border border-white/40 z-20">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="barcode_scanner">barcode_scanner</span>
</div>
<!-- Icon 3: Nutrition Label -->
<div class="absolute -bottom-6 right-12 w-14 h-14 glass-panel rounded-2xl shadow-xl flex items-center justify-center border border-white/40 z-20">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="description">description</span>
</div>
<!-- Icon 4: Voice Waveform -->
<div class="absolute bottom-12 -right-6 w-14 h-14 glass-panel rounded-2xl shadow-xl flex items-center justify-center border border-white/40 z-20">
<div class="flex items-end gap-1 h-5">
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-4"></div>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="mt-8 space-y-6">
<div class="space-y-2">
<p class="font-label text-primary text-xs font-bold tracking-[0.3em] uppercase">Phase 01</p>
<h1 class="font-headline font-extrabold text-4xl text-on-surface leading-tight tracking-tight">
                    Ghi chép siêu tốc
                </h1>
</div>
<p class="text-secondary font-body text-lg leading-relaxed">
                Quét món ăn, mã vạch, nhãn dán hay chỉ cần ra lệnh bằng giọng nói. <span class="text-on-surface font-semibold">NeuraX</span> tích hợp mọi cách thức để việc theo dõi trở nên dễ dàng nhất.
            </p>
<!-- Onboarding Progress Indicators -->
<div class="flex gap-2 pt-4">
<div class="h-1 w-12 bg-primary rounded-full"></div>
<div class="h-1 w-2 bg-outline-variant rounded-full"></div>
<div class="h-1 w-2 bg-outline-variant rounded-full"></div>
</div>
</div>
<!-- Action Section -->
<div class="mt-12 flex flex-col gap-4">
<button class="w-full bg-on-surface text-surface py-5 px-8 rounded-xl font-headline font-bold text-lg flex items-center justify-between group active:scale-95 transition-all">
<span>Tiếp tục</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-center">
<p class="font-label text-[10px] text-outline uppercase tracking-widest py-2">
                    Powered by NeuraX Vision Engine
                </p>
</div>
</div>
</main>
<!-- Decorative Elements for High-Tech feel -->
<div class="fixed top-1/4 -left-12 w-24 h-24 border border-outline-variant/20 rounded-full pointer-events-none"></div>
<div class="fixed bottom-1/3 -right-20 w-40 h-40 border border-primary/10 rounded-full pointer-events-none"></div>
</body></html>
