            background: linear-gradient(135deg, #FF6B35 0%, #FF2E00 100%);

            -webkit-text-fill-color: transparent;
        }

<div class="h-40 bg-surface-container-lowest rounded-xl p-4 flex flex-col justify-end">
<div class="w-2/3 h-6 bg-surface-container-high rounded mb-2"></div>
<div class="w-1/2 h-4 bg-surface-container rounded"></div>
</div>
<div class="grid grid-cols-2 gap-4">

<div class="h-32 bg-surface-container-lowest rounded-xl"></div>
</div>
<div class="h-24 bg-surface-container-lowest rounded-xl"></div>
</main>
</div>

<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#191c1e]/40 backdrop-blur-sm">

<div class="absolute top-4 right-4 text-on-surface-variant/40">
<span class="material-symbols-outlined">close</span>
</div>
<!-- Milestone Visual -->
<div class="relative mb-8">

<div class="absolute inset-0 bg-[#FF6B35]/20 blur-3xl rounded-full scale-150"></div>

</div>

<div class="font-headline font-bold text-lg text-on-primary-container">+12pt</div>
</div>
</div>

</div>

</div>
<div class="flex flex-col items-center text-secondary">
