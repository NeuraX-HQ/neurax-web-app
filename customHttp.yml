customHeaders:
  # HTML: Always fresh
  - pattern: '**/*.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
      - key: 'Pragma'
        value: 'no-cache'
      - key: 'Expires'
        value: '0'

  # JS: Strong cache (immutable)
  - pattern: '**/*.js'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'

  # CSS: Strong cache (immutable)
  - pattern: '**/*.css'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'

  # Images: Strong cache
  - pattern: '**/*.(png|jpg|jpeg|svg|webp|ico|gif)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'

  # Fonts: Strong cache
  - pattern: '**/*.(woff|woff2|ttf|eot)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'

  # Security Headers (Best practice)
  - pattern: '**/*'
    headers:
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
